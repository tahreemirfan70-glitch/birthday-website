<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .heart {
            position: absolute;
            width: 100px;
            height: 90px;
            animation: float 6s ease-in-out infinite;
        }

        .heart:before,
        .heart:after {
            content: '';
            width: 52px;
            height: 80px;
            position: absolute;
            left: 50px;
            transform: rotate(-45deg);
            background: #ff4d6d;
            border-radius: 50px 50px 0 0;
            transform-origin: 0 100%;
        }

        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .birthday-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .name {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .message {
            font-size: 1.4rem;
            color: white;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 300;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .love-note {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .btn-surprise {
            background: linear-gradient(45deg, #794242, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-surprise:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.6);
        }

        .surprise {
            display: none;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .birthday-title { font-size: 3rem; }
            .name { font-size: 2rem; }
            .message { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="hearts"></div>
    
    <div class="container">
        <div class="heart" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="heart" style="top: 20%; right: 15%; animation-delay: 1s;"></div>
        <div class="heart" style="bottom: 20%; left: 20%; animation-delay: 2s;"></div>
        <div class="heart" style="bottom: 30%; right: 10%; animation-delay: 3s;"></div>

        <h1 class="birthday-title">Happy Birthday!</h1>
        <h2 class="name">[DAUD]</h2>
        
        <p class="message">
            Happy Birthday! 🎉
            I don’t say it often, but you mean a lot to me c
            Life feels better with you in it ✨<br>
            You make every day brighter and my heart fuller. 
        </p>

        <div class="love-note">
            <p style="font-family: 'Dancing Script', cursive; font-size: 1.8rem; margin-bottom: 15px;">
        
                You make me happy when see me with eyes fo love 🤍!"
            </p>
        
        </div>

        <button class="btn-surprise" onclick="showSurprise()">💝 Surprise for You! 💝</button>

        <div id="surprise" class="surprise">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ff4d6d; margin-bottom: 20px;">
                Forever Yours ❤️
            </h2>
            <p style="font-size: 1.5rem; color: white;">
                Here's to many more birthdays together!<br>
                
            </p>
        </div>
    </div>

    <script>
        // Floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            document.querySelector('.hearts').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createHeart, 300);

        function showSurprise() {
            document.getElementById('surprise').style.display = 'block';
            document.querySelector('.btn-surprise').style.display = 'none';
            
            // Fireworks effect
            for(let i = 0; i < 50; i++) {
                setTimeout(() => createFirework(), i * 100);
            }
        }

        function createFirework() {
            const firework = document.createElement('div');
            firework.style.position = 'fixed';
            firework.style.left = Math.random() * 100 + 'vw';
            firework.style.top = Math.random() * 100 + 'vh';
            firework.style.width = '6px';
            firework.style.height = '6px';
            firework.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            firework.style.borderRadius = '50%';
            firework.style.pointerEvents = 'none';
            firework.style.zIndex = '20';
            firework.style.animation = 'firework 2s ease-out forwards';
            document.body.appendChild(firework);

            setTimeout(() => firework.remove(), 2000);
        }

        // Add firework animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes firework {
                0% {
                    transform: scale(0) translateY(0);
                    opacity: 1;
                }
                100% {
                    transform: scale(1) translateY(-100vh);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
